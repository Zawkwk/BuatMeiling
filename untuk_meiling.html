<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Victoria Meili</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="Meiling.jpg">
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Background Matrix */
        #matrix-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 5; opacity: 0.15; color: #ea80b0; 
            display: grid; grid-template-columns: repeat(40, 1fr); pointer-events: none; 
        }
        .matrix-column { animation: matrixRain 10s linear infinite; display: flex; flex-direction: column; text-align: center; font-size: 14px; font-family: monospace; font-weight: bold; }
        @keyframes matrixRain { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        
        canvas { position: absolute; z-index: 10; background: transparent; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        
        .love_word { 
            position: absolute; color: #ea80b0; font-family: 'Courier New', monospace; 
            font-size: 0.9rem; text-shadow: 0 0 10px #ea80b0; white-space: nowrap; 
            opacity: 0; transition: opacity 2s ease; 
        }

        /* Overlay untuk kesan dramatis */
        #vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, black 150%);
            z-index: 15; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="matrix-bg"></div>
    <div id="vignette"></div>
    <canvas id="particleCanvas"></canvas>
    <div id="ui"></div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const matrixBg = document.getElementById('matrix-bg');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let fireworks = [];
        let balloons = [];
        const gap = 5; 
        let phase = "countdown"; 
        let heartRotation = 0;

        class Particle {
            constructor(x, y, color = "white") {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = x;
                this.destY = y;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                this.friction = 0.9;
                this.spring = 0.04;
                this.size = 2.5;
                this.color = color;
            }

            update() {
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                
                this.vx += dx * this.spring;
                this.vy += dy * this.spring;
                this.vx *= this.friction;
                this.vy *= this.friction;
                
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class FireworkParticle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.gravity = 0.05;
                this.alpha = 1;
                this.color = color;
            }
            update() {
                this.vx *= 0.98; this.vy *= 0.98;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.alpha -= 0.015;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 3, 3);
                ctx.globalAlpha = 1;
            }
        }

        class Balloon {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 100;
                this.speed = Math.random() * 2 + 1;
                this.size = Math.random() * 20 + 20;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.swing = Math.random() * 2;
            }
            update() {
                this.y -= this.speed;
                this.x += Math.sin(this.y * 0.05) * this.swing;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size * 0.8, this.size, 0, 0, Math.PI * 2);
                ctx.fill();
                // Tali balon
                ctx.strokeStyle = "rgba(255,255,255,0.5)";
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.size);
                ctx.lineTo(this.x, this.y + this.size + 40);
                ctx.stroke();
            }
        }

        function getPoints(text, size) {
            let tCanvas = document.createElement('canvas');
            let tCtx = tCanvas.getContext('2d');
            tCanvas.width = canvas.width;
            tCanvas.height = canvas.height;
            // Gunakan Inter untuk partikel agar lebih tegas
            tCtx.font = `900 ${size}px Inter`;
            tCtx.textAlign = "center";
            tCtx.textBaseline = "middle";
            tCtx.fillText(text, tCanvas.width/2, tCanvas.height/2);
            
            let data = tCtx.getImageData(0,0,tCanvas.width, tCanvas.height).data;
            let pts = [];
            for(let y=0; y<tCanvas.height; y+=gap) {
                for(let x=0; x<tCanvas.width; x+=gap) {
                    if(data[(y*tCanvas.width + x)*4 + 3] > 128) pts.push({x, y});
                }
            }
            return pts;
        }

        function createFirework(x, y) {
            const colors = ['#ff0', '#f0f', '#0ff', '#f00', '#ea80b0'];
            const color = colors[Math.floor(Math.random()*colors.length)];
            for(let i=0; i<50; i++) fireworks.push(new FireworkParticle(x, y, color));
        }

        async function playSequence() {
            // 1. Countdown 3 2 1
            const countdowns = ["3", "2", "1"];
            for(let num of countdowns) {
                let pts = getPoints(num, 400);
                particles = pts.map(p => new Particle(p.x, p.y, "#ea80b0"));
                await new Promise(r => setTimeout(r, 1200));
            }

            // 2. Kembang Api Meriah
            particles = [];
            for(let i=0; i<8; i++) {
                createFirework(Math.random()*canvas.width, Math.random()*canvas.height*0.6);
                await new Promise(r => setTimeout(r, 200));
            }

            // 3. Teks HBD Victoria Meili
            const names = ["HBD", "Victoria", "Meili"];
            for(let n of names) {
                let pts = getPoints(n, 200);
                particles = pts.map(p => new Particle(p.x, p.y, "white"));
                await new Promise(r => setTimeout(r, 2000));
            }

            // 4. Balon & Love Heart
            particles = [];
            phase = "final";
            
            // Trigger Balon Terbang
            for(let i=0; i<30; i++) {
                setTimeout(() => balloons.push(new Balloon()), i * 300);
            }

            buatHatiKeTengah();
        }

        function buatHatiKeTengah() {
            const container = document.getElementById('ui');
            const total = 180;
            container.innerHTML = ''; 

            for (let i = 0; i < total; i++) {
                const span = document.createElement('span');
                span.className = 'love_word';
                span.innerText = 'love you';
                span.dataset.index = i;
                span.dataset.total = total;
                container.appendChild(span);
                setTimeout(() => span.style.opacity = "1", i * 10);
            }
            faseUpdateHati();
        }

        function faseUpdateHati() {
            const words = document.querySelectorAll('.love_word');
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            heartRotation += 0.005; 

            words.forEach((span) => {
                const i = parseFloat(span.dataset.index);
                const total = parseFloat(span.dataset.total);
                const t = ((i / total) * 2 * Math.PI) - heartRotation;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                span.style.left = `${centerX + x * 20}px`; 
                span.style.top = `${centerY + y * 20}px`;
            });
            requestAnimationFrame(faseUpdateHati);
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // Motion blur effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Handle Particles (Text)
            particles.forEach(p => { p.update(); p.draw(); });

            // Handle Fireworks
            fireworks.forEach((f, i) => {
                f.update();
                f.draw();
                if(f.alpha <= 0) fireworks.splice(i, 1);
            });

            // Handle Balloons
            balloons.forEach(b => {
                b.update();
                b.draw();
            });

            requestAnimationFrame(animate);
        }

        // Matrix Setup
        const matrixChars = "VICTORIAMEILIHBD";
        for (let i = 0; i < 40; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (Math.random() * 5 + 7) + 's';
            col.style.left = `${(i/40)*100}%`;
            for (let j = 0; j < 30; j++) {
                const span = document.createElement('span');
                span.innerText = matrixChars[Math.floor(Math.random()*matrixChars.length)];
                col.appendChild(span);
            }
            matrixBg.appendChild(col);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        animate();
        playSequence();
    </script>
</body>
</html>
